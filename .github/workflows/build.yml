name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Python 测试
  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd anyclaw
          poetry install --with dev

      - name: Run tests
        run: |
          cd anyclaw
          poetry run pytest tests/ -v --tb=short

  # 前端构建测试
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Build frontend
        working-directory: tauri-app
        run: npm run build

  # Tauri 构建测试（macOS）
  build-tauri-macos:
    runs-on: macos-latest
    needs: [test-python, build-frontend]

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            platform: macos-arm64
          - target: x86_64-apple-darwin
            platform: macos-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd anyclaw
          pip install -e .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Sidecar
        run: |
          cd anyclaw
          python build_sidecar.py --platform ${{ matrix.platform }} --output ../tauri-app/src-tauri

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri:build

  # Tauri 构建测试（Windows）
  build-tauri-windows:
    runs-on: windows-latest
    needs: [test-python, build-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd anyclaw
          pip install -e .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Sidecar
        run: |
          cd anyclaw
          python build_sidecar.py --platform windows-x64 --output ../tauri-app/src-tauri

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri:build
