name: Manual Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'windows-x64'
        type: choice
        options:
          - windows-x64
          - macos-arm64
          - macos-x64

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    if: inputs.platform == 'windows-x64'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd anyclaw
          pip install -e .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Sidecar
        run: |
          cd anyclaw
          python build_sidecar.py --platform windows-x64 --output ../tauri-app/src-tauri

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri:build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: AnyClaw-0.1.0-windows-msi
          path: tauri-app/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: AnyClaw-0.1.0-windows-exe
          path: tauri-app/src-tauri/target/release/bundle/nsis/*-setup.exe
          retention-days: 7

  build-macos-arm64:
    if: inputs.platform == 'macos-arm64'
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd anyclaw
          pip install -e .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Sidecar
        run: |
          cd anyclaw
          python build_sidecar.py --platform macos-arm64 --output ../tauri-app/src-tauri

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri:build -- --target aarch64-apple-darwin

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw-macos-arm64
          path: tauri-app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  build-macos-x64:
    if: inputs.platform == 'macos-x64'
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd anyclaw
          pip install -e .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Sidecar
        run: |
          cd anyclaw
          python build_sidecar.py --platform macos-x64 --output ../tauri-app/src-tauri

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri:build -- --target x86_64-apple-darwin

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw-macos-x64
          path: tauri-app/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7
