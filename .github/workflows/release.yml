name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd anyclaw
          pip install -e .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Sidecar
        run: |
          cd anyclaw
          python build_sidecar.py --platform windows-x64 --output ../tauri-app/src-tauri

      - name: Build Tauri app
        working-directory: tauri-app
        run: npm run tauri:build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: AnyClaw-${{ github.ref_name }}-windows-msi
          path: tauri-app/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: AnyClaw-${{ github.ref_name }}-windows-exe
          path: tauri-app/src-tauri/target/release/bundle/nsis/*-setup.exe
          retention-days: 30
