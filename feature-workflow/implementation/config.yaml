# Feature Workflow 配置

# 项目信息
project:
  name: OA_Tool
  main_branch: main              # 默认合并目标分支
  repo_path: oa-tool              # Git 仓库子目录 (monorepo 场景)

  tech_stack: electron-react-vite

  test_framework: playwright

# 并行控制
parallelism:
  max_concurrent: 2                    # 最大并行开发数

# Git 设置
git:
  remote: origin                       # 远程仓库名称
  auto_push: false                     # 合并后自动推送 main
  merge_strategy: "--no-ff"            # 合并策略
  push_tags: true                      # 是否自动推送 tag

# 分支策略
branch_prefix: feature
worktree_prefix: OA_Tool
worktree_base: ..

# 工作流设置
workflow:
  auto_start: false
  require_checklist: true

  # 需求切分
  splitting:
    enabled: true
    threshold: 3              # 超过3个价值点自动拆分

  # 测试配置
  testing:
    playwright_mcp: false              # Playwright MCP (项目暂未配置)
    e2e_dir: e2e              # E2E 测试目录
    base_url: http://localhost:3000   # 开发服务器 URL

# 归档配置
completion:
  archive:
    create_tag: true                   # 创建归档 tag
    tag_format: "{id}-{date}"          # tag 格式: feat-auth-20260302
    tag_date_format: "%Y%m%d"          # 日期格式

  cleanup:
    delete_worktree: true              # 删除 worktree
    delete_branch: true                # 删除分支 (可从 tag 恢复)

  record:
    update_spec: true                  # 更新 spec.md
    update_archive_log: true           # 更新 archive-log.yaml

# 命名规则
naming:
  feature_prefix: feat                 # feat-xxx
  branch_prefix: feature               # feature/xxx
  worktree_prefix: OA_Tool             # ../OA_Tool-feat-xxx

# 路径配置
paths:
  features_dir: features               # 需求目录
  archive_dir: features/archive        # 归档目录
  worktree_base: ..                    # worktree 父目录
  repo_path: oa-tool                   # Git 仓库相对路径
